<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Surface Background matching portfolio's #0A0A0A -->
  <rect width="256" height="256" fill="#0A0A0A" rx="56" />
  
  <!-- Technical Border matching portfolio's border -->
  <rect x="2" y="2" width="252" height="252" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4" rx="54" />

  <!-- Subtle grid pattern to match .bg-grid-pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </pattern>
  <rect width="256" height="256" fill="url(#grid)" rx="56" />

  <!-- Brutalist 'A' shape - mathematically perfect parallel legs -->
  <path d="M 112 56 H 144 L 192 184 H 152 L 128 120 L 104 184 H 64 Z" fill="#0070F3" />
  
  <!-- High-Velocity Glitch/Cursor Block -->
  <!-- Starts inside the left leg and streaks past the right leg -->
  <rect x="112" y="140" width="84" height="24" fill="#EDEDED" />
</svg>
